services:
  changedetection:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: changedetection
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      LISTEN_HOST: "0.0.0.0"
    volumes:
      - changedetection-data:/datastore
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5000/worker-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  changedetection-data:
